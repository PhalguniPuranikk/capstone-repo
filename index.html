<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glamour Shop 💄</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #ff2e63;
      --secondary: #ffb347;
      --accent: #ff85a1;
      --dark: #1a1a2e;
      --light: #fff5f7;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      position: relative;
      overflow-y: auto;
    }

    /* Animated background particles */
    .bg-particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      animation: float 20s infinite;
    }

    .bg-particle:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .bg-particle:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 70%;
      left: 80%;
      animation-delay: 3s;
    }

    .bg-particle:nth-child(3) {
      width: 60px;
      height: 60px;
      top: 50%;
      left: 20%;
      animation-delay: 6s;
    }

    .bg-particle:nth-child(4) {
      width: 100px;
      height: 100px;
      top: 20%;
      left: 70%;
      animation-delay: 9s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.3;
      }
      50% {
        transform: translateY(-50px) rotate(180deg);
        opacity: 0.8;
      }
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 30px;
      width: 450px;
      max-width: 90vw;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.3),
        inset 0 0 40px rgba(255, 255, 255, 0.5);
      position: relative;
      z-index: 10;
      animation: slideIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes slideIn {
      from {
        transform: translateY(-100px) scale(0.8);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 10px;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
        filter: drop-shadow(0 0 10px rgba(255, 46, 99, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(255, 46, 99, 0.6));
      }
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: #f5f5f5;
      padding: 5px;
      border-radius: 15px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: #666;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 5px 15px rgba(255, 46, 99, 0.3);
      transform: scale(1.05);
    }

    .tab:hover:not(.active) {
      background: #e0e0e0;
    }

    .form-section {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .form-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-group input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.3s ease;
      background: white;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 46, 99, 0.1);
      transform: translateY(-2px);
    }

    .input-group input::placeholder {
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 10px 25px rgba(255, 46, 99, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(255, 46, 99, 0.4);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      font-weight: 600;
      text-align: center;
      font-size: 14px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: white;
    }

    .message.error {
      background: linear-gradient(135deg, #f87171, #ef4444);
      color: white;
    }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn.loading .btn-text {
      opacity: 0;
    }

    .btn.loading .spinner {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* User info display */
    .user-info {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .user-info.show {
      display: block;
    }

    .user-info p {
      margin: 5px 0;
      font-size: 14px;
    }

    .user-info strong {
      font-weight: 700;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 10px;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Sparkle effect */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkleAnim 1s ease-out forwards;
    }

    @keyframes sparkleAnim {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(180deg) translateY(-50px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div class="bg-particle"></div>
  <div class="bg-particle"></div>
  <div class="bg-particle"></div>
  <div class="bg-particle"></div>

  <div class="container">
    <div class="logo">💄 Glamour</div>
    <div class="subtitle">YOUR BEAUTY DESTINATION</div>

    <!-- User info (shown when logged in) -->
    <div class="user-info" id="userInfo">
      <p><strong>Welcome back!</strong></p>
      <p id="userEmail"></p>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('signup')">Sign Up</button>
      <button class="tab" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('order')">Place Order</button>
    </div>

    <!-- Signup Form -->
    <div class="form-section active" id="signup">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="handleSignup()">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Login Form -->
    <div class="form-section" id="login">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Order Form -->
    <div class="form-section" id="order">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="orderEmail" placeholder="your@email.com" />
      </div>
      <div class="input-group">
        <label>Product Name</label>
        <input type="text" id="product" placeholder="Luxury Lipstick" />
      </div>
      <div class="input-group">
        <label>Quantity</label>
        <input type="number" id="quantity" placeholder="1" min="1" />
      </div>
      <button class="btn btn-primary" onclick="placeOrder()">
        <span class="btn-text">Place Order</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Message Display -->
    <div class="message" id="msg"></div>
  </div>

  <script>
    let currentUser = null;

    // Switch between tabs
    function switchTab(tab) {
      // Update active tab button
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      // Update active form section
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      document.getElementById(tab).classList.add('active');

      // Clear message
      hideMessage();

      // Add sparkle effect
      createSparkles(event.target);
    }

    // Create sparkle effect
    function createSparkles(element) {
      const rect = element.getBoundingClientRect();
      for (let i = 0; i < 5; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * 50 + 'px';
        sparkle.style.top = rect.top + rect.height / 2 + (Math.random() - 0.5) * 50 + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    // Show loading state
    function showLoading(button) {
      button.classList.add('loading');
    }

    // Hide loading state
    function hideLoading(button) {
      button.classList.remove('loading');
    }

    // Show message
    function showMessage(text, type = 'success') {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `message ${type} show`;
    }

    // Hide message
    function hideMessage() {
      const msg = document.getElementById('msg');
      msg.classList.remove('show');
    }

    // Update UI based on login state
    function updateUIForUser(email) {
      currentUser = email;
      document.getElementById('userEmail').textContent = email;
      document.getElementById('userInfo').classList.add('show');
      document.getElementById('orderEmail').value = email;
    }

    // Logout
    function logout() {
      currentUser = null;
      document.getElementById('userInfo').classList.remove('show');
      document.getElementById('orderEmail').value = '';
      showMessage('Logged out successfully', 'success');
    }

    // Handle Signup
    async function handleSignup() {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const button = event.target;

      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      showLoading(button);
      hideMessage();

      try {
        const response = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.text();
        
        if (response.ok) {
          showMessage(data, 'success');
          updateUIForUser(email);
          document.getElementById('signupEmail').value = '';
          document.getElementById('signupPassword').value = '';
        } else {
          showMessage(data, 'error');
        }
      } catch (error) {
        showMessage('Connection error. Please try again.', 'error');
      } finally {
        hideLoading(button);
      }
    }

    // Handle Login
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const button = event.target;

      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      showLoading(button);
      hideMessage();

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.text();
        
        if (response.ok) {
          showMessage(data, 'success');
          updateUIForUser(email);
          document.getElementById('loginEmail').value = '';
          document.getElementById('loginPassword').value = '';
        } else {
          showMessage(data, 'error');
        }
      } catch (error) {
        showMessage('Connection error. Please try again.', 'error');
      } finally {
        hideLoading(button);
      }
    }

    // Place Order
    async function placeOrder() {
      const email = document.getElementById('orderEmail').value.trim();
      const product = document.getElementById('product').value.trim();
      const quantity = document.getElementById('quantity').value;
      const button = event.target;

      if (!email || !product || !quantity) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      showLoading(button);
      hideMessage();

      try {
        const response = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            product,
            quantity: parseInt(quantity)
          })
        });

        const data = await response.text();
        
        if (response.ok) {
          showMessage(data, 'success');
          document.getElementById('product').value = '';
          document.getElementById('quantity').value = '';
        } else {
          showMessage(data, 'error');
        }
      } catch (error) {
        showMessage('Connection error. Please try again.', 'error');
      } finally {
        hideLoading(button);
      }
    }

    // Add enter key support
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const activeSection = document.querySelector('.form-section.active');
        if (activeSection.id === 'signup') handleSignup();
        else if (activeSection.id === 'login') handleLogin();
        else if (activeSection.id === 'order') placeOrder();
      }
    });
  </script>
</body>
</html>
